# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
  #- hpctoolkit
  - hpctoolkit +mpi
  view: true
  concretizer:
    unify: true
  config:
    install_tree:
      root: /software/projects/pawsey0835/sbhardwaj/setonix/2025.08/software/hpctoolkit
  'compilers:':
  # compilers automatically found by spack compiler find 
  # on cray list a lot of unused and not useful 
  # compilers hence we do not here 
  # list all that are found. 

  # ===================================================================
  #                        GNU 14.2.0
  # ===================================================================
  - compiler:
      spec: gcc@14.2.0
      paths:
        cc: cc
        cxx: CC
        f77: ftn
        fc: ftn
      flags:
        cflags: null
        cxxflags: null
        cppflags: null
        fflags: -fallow-argument-mismatch
      operating_system: sles15
      target: any
      modules:
      - PrgEnv-gnu
      - gcc-native/14.2
      - craype/2.7.34
      - craype-x86-milan
      - craype-network-ofi
      - xpmem
      - libfabric
      environment:
        set:
          PE_ENV: GNU
      extra_rpaths: []
  packages:
    cmake:
      externals:
      - spec: cmake@3.30.5
        modules:
        - cmake/3.30.5
      buildable: false
